<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萊廷照明 鋁線槽系列規格表</title>
<style>
/* ─── CSS 變數 ─── */
:root {
  --bg-base:    #0d1117;
  --bg-surface: #161b22;
  --bg-card:    #21262d;
  --bg-hover:   #2d333b;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --text-code:  #79c0ff;
  --accent:     #58a6ff;
  --price:      #7ee787;
  --warn-bg:    #3d2b00;
  --warn-text:  #e3b341;
  --warn-border:#7d4e00;
  --cat-active: #388bfd;
  --cat-active-text: #ffffff;
  --copy-ok:    #3fb950;
  --header-bg:  #0f2035;
  --pill-text:  #7d8590;
}

/* ─── Reset / Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: "微軟正黑體", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
  background: var(--bg-base);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── Header ─── */
header {
  background: var(--header-bg);
  border-bottom: 1px solid #1c3a5c;
  padding: 20px 24px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.6);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .04em;
}
header h2 {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-muted);
}

/* ─── Controls ─── */
.controls {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px 0;
}
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 15px;
}
#searchInput {
  width: 100%;
  max-width: 480px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  padding: 9px 12px 9px 36px;
  outline: none;
  transition: border-color .15s;
}
#searchInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(88,166,255,.15);
}
#searchInput::placeholder { color: var(--text-muted); }

/* ─── Category Filters ─── */
.cat-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.cat-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--pill-text);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  padding: 4px 12px;
  transition: background .12s, color .12s, border-color .12s;
  white-space: nowrap;
}
.cat-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
  border-color: #8b949e;
}
.cat-btn.active {
  background: var(--cat-active);
  border-color: var(--cat-active);
  color: var(--cat-active-text);
  font-weight: 600;
}

/* ─── Stats bar ─── */
.stats-bar {
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px 0 12px;
}
.stats-bar strong { color: var(--text); }

/* ─── Table wrapper ─── */
.table-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 48px;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead tr {
  background: var(--bg-card);
  position: sticky;
  top: 68px;
  z-index: 50;
}
th {
  padding: 10px 12px;
  text-align: left;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  user-select: none;
}
th.sortable {
  cursor: pointer;
}
th.sortable:hover { color: var(--text); }
th.sorted-asc::after  { content: " ▲"; color: var(--accent); }
th.sorted-desc::after { content: " ▼"; color: var(--accent); }
th:not(.sorted-asc):not(.sorted-desc).sortable::after { content: " ⇅"; opacity: .3; }

td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tbody tr:hover td { background: var(--bg-hover) !important; }

/* row colours */
tr.row-even td { background: var(--bg-surface); }
tr.row-odd  td { background: var(--bg-base); }
tr.row-warn td {
  background: var(--warn-bg) !important;
  border-bottom-color: var(--warn-border);
}
tr.row-warn:hover td { background: #4d3800 !important; }

/* ─── Cell styles ─── */
.cell-code {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  color: var(--text-code);
  font-weight: 600;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  font-size: 12.5px;
}
.cell-code:hover { text-decoration: underline; }

.copy-toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--copy-ok);
  color: #000;
  font-size: 13px;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .2s;
  z-index: 999;
}
.copy-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.cell-price {
  color: var(--price);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.cell-unit { color: var(--text-muted); font-size: 12px; }
.cell-dim  { color: var(--text); font-variant-numeric: tabular-nums; white-space: nowrap; }
.cell-dim-dash { color: var(--text-muted); }

.cat-pill {
  display: inline-block;
  background: rgba(88,166,255,.1);
  border: 1px solid rgba(88,166,255,.25);
  border-radius: 12px;
  color: var(--accent);
  font-size: 11px;
  padding: 1px 8px;
  white-space: nowrap;
}

.note-warn { color: var(--warn-text); font-size: 12px; }
.note-ok   { color: var(--text-muted); font-size: 12px; }

/* ─── Empty state ─── */
.empty-state {
  text-align: center;
  padding: 60px 0;
  color: var(--text-muted);
}
.empty-state svg { margin-bottom: 12px; opacity: .3; }

/* ─── Footer ─── */
footer {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px 40px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}
footer span { white-space: nowrap; }
footer strong { color: var(--text); }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }

@media (max-width: 768px) {
  header { padding: 14px 16px 12px; }
  .controls { padding: 12px 16px 0; }
  .table-wrap { padding: 0 0 40px; }
  header h1 { font-size: 17px; }
}
</style>
</head>

let state = { q: "", cat: "", sortCol: null, sortDir: 1 };

const tbody    = document.getElementById("tableBody");
const countEl  = document.getElementById("countShown");
const emptyEl  = document.getElementById("emptyState");
const toast    = document.getElementById("copyToast");
let toastTimer = null;

function dim(val) {
  return val != null ? val : null;
}

function fmtDim(p) {
  const w = dim(p.w), h = dim(p.h);
  if (w != null && h != null) {
    return `<span class="cell-dim">${w} × ${h}</span>`;
  }
  return `<span class="cell-dim-dash">—</span>`;
}

function fmtDepth(p) {
  return p.depth != null
    ? `<span class="cell-dim">${p.depth}</span>`
    : `<span class="cell-dim-dash">—</span>`;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "gi");
  return text.replace(re, '<mark style="background:#bb8009;color:#fff;border-radius:2px;padding:0 2px">$1</mark>');
}

function render() {
  const { q, cat, sortCol, sortDir } = state;
  const ql = q.toLowerCase();

  let data = PRODUCTS.filter(p => {
    const matchCat = !cat || p.cat === cat;
    if (!ql) return matchCat;
    const matchQ =
      p.code.toLowerCase().includes(ql) ||
      p.name.toLowerCase().includes(ql) ||
      p.note.toLowerCase().includes(ql) ||
      p.cat.toLowerCase().includes(ql);
    return matchCat && matchQ;
  });

  if (sortCol) {
    data = [...data].sort((a, b) => {
      let av = a[sortCol] ?? (sortDir > 0 ? Infinity : -Infinity);
      let bv = b[sortCol] ?? (sortDir > 0 ? Infinity : -Infinity);
      if (typeof av === "number" && typeof bv === "number") return (av - bv) * sortDir;
      return String(av).localeCompare(String(bv), "zh-TW") * sortDir;
    });
  }

  countEl.textContent = data.length;
  emptyEl.style.display = data.length ? "none" : "block";
  document.getElementById("productTable").style.display = data.length ? "" : "none";

  const rows = data.map((p, i) => {
    const rowClass = p.warn ? "row-warn" : (i % 2 === 0 ? "row-even" : "row-odd");
    const noteHtml = p.note
      ? `<span class="${p.warn ? "note-warn" : "note-ok"}">${highlight(p.note, ql)}</span>`
      : "";
    return `<tr class="${rowClass}">
      <td class="cell-code" onclick="copyCode('${p.code}')" title="點擊複製料號">${highlight(p.code, ql)}</td>
      <td>${highlight(p.name, ql)}</td>
      <td><span class="cat-pill">${p.cat}</span></td>
      <td>${fmtDim(p)}</td>
      <td>${fmtDepth(p)}</td>
      <td class="cell-price">${p.price.toLocaleString("zh-TW")}</td>
      <td class="cell-unit">${p.unit}</td>
      <td class="cell-unit">P${p.cat_page}</td>
      <td>${noteHtml}</td>
    </tr>`;
  }).join("");

  tbody.innerHTML = rows;
}

function showToast(code) {
  toast.textContent = `已複製  ${code}  ✓`;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
}

function fallbackCopy(code) {
  const ta = document.createElement("textarea");
  ta.value = code;
  ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
  showToast(code);
}

function copyCode(code) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(code).then(() => showToast(code)).catch(() => fallbackCopy(code));
  } else {
    fallbackCopy(code);
  }
}

// ─── Search ───────────────────────────────────────────────────────────────
let searchTimer = null;
document.getElementById("searchInput").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.q = e.target.value.trim();
    render();
  }, 120);
});
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Escape") {
    e.target.value = "";
    state.q = "";
    render();
  }
});

// ─── Category filter ──────────────────────────────────────────────────────
document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.cat = btn.dataset.cat;
    render();
  });
});

// ─── Sort ─────────────────────────────────────────────────────────────────
document.querySelectorAll("th.sortable").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (state.sortCol === col) {
      state.sortDir *= -1;
    } else {
      state.sortCol = col;
      state.sortDir = 1;
    }
    document.querySelectorAll("th").forEach(t => t.classList.remove("sorted-asc", "sorted-desc"));
    th.classList.add(state.sortDir === 1 ? "sorted-asc" : "sorted-desc");
    render();
  });
});

// ─── Init ─────────────────────────────────────────────────────────────────
render();
</script>
